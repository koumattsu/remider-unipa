name: UNIPA Daily Reminder

on:
  schedule:
    # 日本時間 08:00 = UTC 23:00（前日）
    - cron: "0 23 * * *"
  # 手動実行もできるように
  workflow_dispatch:

jobs:
  call-cron-endpoint:
    runs-on: ubuntu-latest

    steps:
      - name: Call UNIPA cron endpoint
        run: |
          curl -X POST "${{ secrets.UNIPA_CRON_ENDPOINT }}"

