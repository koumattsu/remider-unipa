# .github/workflows/unipa-reminder-cron.yml

name: UNIPA Reminder Cron

on:
  schedule:
    # 毎時 00 分 と 30 分 に実行（UTC）
    - cron: "0,30 * * * *"
  workflow_dispatch:


jobs:
  call-daily-cron:
    runs-on: ubuntu-latest

    steps:
      - name: Call Render /api/v1/cron/daily
        run: |
          curl -X POST "https://unipa-reminder-backend.onrender.com/api/v1/cron/daily" \
               -H "Content-Type: application/json" \
               --fail
