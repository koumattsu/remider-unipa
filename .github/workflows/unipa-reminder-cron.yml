# .github/workflows/unipa-reminder-cron.yml

name: UNIPA Reminder Cron

on:
  schedule:
    # 毎時 00 分 と 30 分 に実行（UTC）
    - cron: "0,30 * * * *"
  workflow_dispatch:

jobs:
  call-daily-cron:
    runs-on: ubuntu-latest
    steps:
      - name: Call Render /api/v1/cron/daily
        run: |
          set -euo pipefail
          echo "Now(UTC): $(date -u)"

          BASE="https://unipa-reminder-backend.onrender.com"

          echo "Warmup (GET /health)..."
          curl -sS -L "${BASE}/health" \
               --connect-timeout 20 \
               --max-time 60 \
               -w "\nWARMUP_HTTP_STATUS=%{http_code}\n" || true

          echo "POST /api/v1/cron/daily (with retry)..."
          curl -sS -L -X POST "${BASE}/api/v1/cron/daily" \
               -H "Content-Type: application/json" \
               --connect-timeout 20 \
               --max-time 180 \
               --retry 5 \
               --retry-all-errors \
               --retry-delay 5 \
               -w "\nHTTP_STATUS=%{http_code}\n" \
               --fail-with-body