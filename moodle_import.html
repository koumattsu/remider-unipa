<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Moodle課題取り込み（UNIPAリマインダー）</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 800px;
      margin: 24px auto;
      padding: 0 16px;
      line-height: 1.6;
    }
    textarea {
      width: 100%;
      height: 260px;
      box-sizing: border-box;
      font-family: monospace;
      font-size: 12px;
    }
    button {
      padding: 8px 16px;
      font-size: 14px;
      cursor: pointer;
      margin-top: 8px;
    }
    #result {
      margin-top: 16px;
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 14px;
      display: none;
    }
    #result.success {
      background: #e6ffed;
      border: 1px solid #34c759;
      color: #246b3f;
    }
    #result.error {
      background: #ffecec;
      border: 1px solid #ff3b30;
      color: #7a1f1a;
    }
  </style>
</head>
<body>
  <h1>Moodle課題取り込み</h1>
  <p>
    Moodleの「タイムライン」画面のHTMLをコピーして、下のフォームに貼り付けてください。<br />
    「取り込み」ボタンを押すと、UNIPAリマインダーに課題が保存されます。
  </p>

  <label for="html-input">Moodle タイムライン HTML</label><br />
  <textarea id="html-input" placeholder="MoodleのタイムラインHTMLをここに貼り付け"></textarea>
  <br />
  <button id="submit-btn">取り込み</button>

  <div id="result"></div>

  <script>
    const submitBtn = document.getElementById("submit-btn");
    const htmlInput = document.getElementById("html-input");
    const resultDiv = document.getElementById("result");

    submitBtn.addEventListener("click", async () => {
      const html = htmlInput.value.trim();
      if (!html) {
        showResult("HTMLが空です。MoodleのタイムラインHTMLを貼り付けてください。", "error");
        return;
      }

      try {
        const res = await fetch("http://127.0.0.1:8000/api/v1/tasks/import-moodle-html", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ html }),
        });

        if (!res.ok) {
          const text = await res.text();
          showResult("エラーが発生しました: " + text, "error");
          return;
        }

        const data = await res.json();
        showResult(
          `取り込み完了: 新規 ${data.created} 件 / 更新 ${data.updated} 件`,
          "success"
        );
      } catch (err) {
        console.error(err);
        showResult("通信エラーが発生しました。ブラウザのコンソールを確認してください。", "error");
      }
    });

    function showResult(message, type) {
      resultDiv.textContent = message;
      resultDiv.className = "";
      resultDiv.classList.add(type === "success" ? "success" : "error");
      resultDiv.style.display = "block";
    }
  </script>
</body>
</html>
